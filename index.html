<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>מונדיאל 2026 ⚽</title>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden}
:root{
  --blue:#1565C0;--blue2:#0D47A1;--red:#E8003D;--gold:#FFD700;
  --bg:#162540;--bg2:#1A2D4A;--card:#1E3050;--card2:#223560;
  --muted:#7A90B5;--border:rgba(255,255,255,.1);
  --green:#00C851;--text:#D8E4F0;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:80px;position:relative}

#bgPattern{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;opacity:.0}

/* ── ANIMATIONS ── */
@keyframes ballSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes floatUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes starsPulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes countUp{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
@keyframes slideDown{from{transform:translateX(-50%) translateY(-60px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

/* ── LOGIN ── */
.login-wrap{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;gap:16px;padding:30px 24px;text-align:center;position:relative;overflow:hidden;
  background:
    radial-gradient(circle at 20% 20%,rgba(232,0,61,.12) 0%,transparent 45%),
    radial-gradient(circle at 80% 80%,rgba(21,101,192,.15) 0%,transparent 45%),
    #2A4060;
}
.login-stars{font-size:1.1rem;letter-spacing:4px;animation:starsPulse 3s ease-in-out infinite;color:var(--gold);position:relative;z-index:1}
.login-trophy-bg{position:absolute;top:50%;left:50%;transform:translate(-50%,-54%);width:90%;max-width:380px;opacity:.35;pointer-events:none;z-index:0;filter:drop-shadow(0 0 30px rgba(255,215,0,.25))}
.login-heroes{display:flex;align-items:flex-end;justify-content:center;gap:20px;position:relative;z-index:1;width:100%}
.login-trophy-sm{width:115px;height:150px;object-fit:contain;filter:drop-shadow(0 10px 30px rgba(255,215,0,.5));flex-shrink:0;margin-bottom:8px}
.login-ball-wrap{animation:floatUp 4s ease-in-out infinite;filter:drop-shadow(0 20px 30px rgba(0,0,0,.5));flex-shrink:0}
.login-ball-spin{animation:ballSpin 18s linear infinite;transform-origin:center;border-radius:50%;object-fit:cover}
.wc-title{color:rgba(255,255,255,.6);font-size:.7rem;font-weight:700;letter-spacing:.3em;text-transform:uppercase;position:relative;z-index:1}
.wc-h1{color:#fff;font-size:2.2rem;font-weight:900;line-height:1;letter-spacing:.05em;text-transform:uppercase;text-shadow:0 0 40px rgba(232,0,61,.5);position:relative;z-index:1}
.wc-year{font-size:3.5rem;font-weight:900;background:linear-gradient(135deg,#FFD700,#FFA000,#FF4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin:-6px 0;position:relative;z-index:1}
.wc-sub{color:rgba(255,255,255,.45);font-size:.72rem;letter-spacing:.15em;position:relative;z-index:1}
.login-wrap input{width:100%;max-width:280px;padding:14px;border:1.5px solid rgba(255,255,255,.15);border-radius:14px;font-size:1rem;text-align:center;background:rgba(255,255,255,.06);color:#fff;outline:none;backdrop-filter:blur(12px)}
.login-wrap input::placeholder{color:rgba(255,255,255,.3)}
.login-wrap input:focus{border-color:var(--gold);background:rgba(255,215,0,.07);box-shadow:0 0 0 3px rgba(255,215,0,.1)}
.btn-gold{background:linear-gradient(135deg,#FFD700,#FF8C00);color:#080e1a;border:none;padding:14px 32px;border-radius:14px;font-size:1rem;font-weight:800;cursor:pointer;width:100%;max-width:280px;box-shadow:0 4px 24px rgba(255,140,0,.35),0 0 0 1px rgba(255,215,0,.2)}
.btn-gold:active{transform:scale(.97)}

/* ── HEADER ── */
.header{
  background:linear-gradient(90deg,#030810 0%,#0D1F3C 50%,#030810 100%);
  color:#fff;padding:11px 16px;display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:0;z-index:50;
  border-bottom:1px solid rgba(232,0,61,.4);
  box-shadow:0 2px 20px rgba(0,0,0,.7),0 1px 0 rgba(255,215,0,.08);
}
.header h1{font-size:.95rem;font-weight:800;letter-spacing:.04em;background:linear-gradient(90deg,#fff,rgba(255,215,0,.85));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logout-btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.7);padding:5px 10px;border-radius:8px;font-size:.75rem;cursor:pointer}

/* ── LIVE BAR ── */
.live-bar{background:linear-gradient(90deg,#B00020,#E8003D,#B00020);color:#fff;text-align:center;font-size:.75rem;font-weight:700;padding:5px;display:none;gap:8px;align-items:center;justify-content:center}
.live-bar.on{display:flex}
.blink{animation:pulse 1s infinite}

/* ── NAV ── */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#060D1C;border-top:1px solid rgba(255,255,255,.06);display:flex;z-index:50;box-shadow:0 -4px 20px rgba(0,0,0,.5)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 2px 6px;cursor:pointer;border:none;background:none;color:#3D5270;font-size:.6rem;gap:2px;transition:color .2s}
.nav-btn .ic{font-size:1.15rem}
.nav-btn.active{color:var(--gold)}
.nav-btn.active .ic{filter:drop-shadow(0 0 6px rgba(255,215,0,.6))}

/* ── SCREENS ── */
.screen{display:none;padding:12px}
.screen.active{display:block}

/* ── FILTERS ── */
.filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:8px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.fb{flex-shrink:0;padding:5px 13px;border-radius:20px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);font-size:.75rem;font-weight:600;cursor:pointer;color:var(--muted)}
.fb.on{background:rgba(21,101,192,.4);color:var(--gold);border-color:rgba(21,101,192,.6)}

.sec{font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:.08em;margin:12px 0 6px;text-transform:uppercase}

/* ── MATCH CARD ── */
.mc{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:8px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.3)}
.mc-top{padding:6px 12px;font-size:.7rem;display:flex;justify-content:space-between;align-items:center;font-weight:700;letter-spacing:.03em}
.mc-top.pre{background:linear-gradient(90deg,rgba(21,101,192,.5),rgba(13,71,161,.3));color:rgba(255,255,255,.8);border-bottom:1px solid rgba(21,101,192,.3)}
.mc-top.live{background:linear-gradient(90deg,rgba(232,0,61,.6),rgba(180,0,30,.4));color:#fff;border-bottom:1px solid rgba(232,0,61,.4)}
.mc-top.ft{background:rgba(255,255,255,.04);color:var(--muted);border-bottom:1px solid var(--border)}
.mc-body{display:grid;grid-template-columns:1fr auto 1fr;align-items:start;padding:14px 10px 10px;gap:4px;direction:rtl}
.team{text-align:center}
.flag{font-size:1.9rem}
.tname{font-size:.7rem;font-weight:600;margin-top:3px;line-height:1.2;direction:rtl;color:var(--text)}
.team-sc{font-size:.6rem;color:var(--muted);margin-top:5px;line-height:1.6;direction:rtl;text-align:center;unicode-bidi:plaintext}
.team-sc.live{color:#FF4444}
.score-mid{text-align:center;min-width:60px;padding-top:4px}
.sc{font-size:1.6rem;font-weight:900;color:#fff;font-variant-numeric:tabular-nums}
.sc.live-sc{color:#FF4444;text-shadow:0 0 12px rgba(232,0,61,.5)}
.vs{font-size:.85rem;color:var(--muted);font-weight:700}
.live-min-sm{font-size:.65rem;color:#FF4444;margin-top:2px;font-weight:700}
.mc-bot{padding:4px 12px 10px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:.7rem;font-weight:700;white-space:nowrap}
.b-none{background:rgba(255,255,255,.06);color:var(--muted)}
.b-ok{background:rgba(0,200,81,.15);color:#00E676;border:1px solid rgba(0,200,81,.25)}
.b-part{background:rgba(255,193,7,.12);color:#FFC107;border:1px solid rgba(255,193,7,.2)}
.b-wrong{background:rgba(232,0,61,.12);color:#FF4444;border:1px solid rgba(232,0,61,.2)}
.b-wait{background:rgba(21,101,192,.15);color:#42A5F5;border:1px solid rgba(21,101,192,.25)}
.pred-btn{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;border:none;padding:6px 14px;border-radius:8px;font-size:.75rem;font-weight:700;cursor:pointer;flex-shrink:0;box-shadow:0 2px 8px rgba(21,101,192,.3)}
.pred-btn.done{background:rgba(21,101,192,.15);color:#42A5F5;border:1px solid rgba(21,101,192,.25);box-shadow:none}

/* ── SCORER STRIP ── */
.scorer-strip{font-size:.65rem;color:var(--muted);padding:5px 14px 8px;text-align:center;line-height:1.5;border-top:1px solid var(--border);background:rgba(255,255,255,.02)}
.scorer-strip.live{background:rgba(232,0,61,.06);border-top:1px solid rgba(232,0,61,.2);color:#FF6666}

/* ── STATS ── */
.stats-top{background:linear-gradient(135deg,#0D1F3C,#1565C0);color:#fff;border-radius:14px;padding:20px;text-align:center;margin-bottom:12px;border:1px solid rgba(21,101,192,.3);box-shadow:0 8px 32px rgba(21,101,192,.2)}
.big-pts{font-size:3.5rem;font-weight:900;line-height:1;text-shadow:0 0 30px rgba(255,215,0,.3)}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 6px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.stat .n{font-size:1.7rem;font-weight:800;color:#fff}
.stat .l{font-size:.65rem;color:var(--muted);margin-top:2px}
.g .n{color:var(--green)}.y .n{color:#FFC107}.r .n{color:#FF4444}
.share-btn{width:100%;padding:13px;background:#25D366;color:#fff;border:none;border-radius:11px;font-size:.9rem;font-weight:700;cursor:pointer;margin-top:10px}

/* ── LEADERBOARD ── */
.lb-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.3)}
.lb-row{display:flex;align-items:center;padding:13px 14px;border-bottom:1px solid var(--border);gap:10px}
.lb-row:last-child{border-bottom:none}
.lb-row.me{background:rgba(21,101,192,.1);border-right:2px solid var(--blue)}
.rnk{font-size:1.2rem;width:26px;text-align:center}
.lb-n{flex:1;font-weight:600;font-size:.88rem;color:var(--text)}
.lb-p{font-size:1.1rem;font-weight:800;color:var(--gold)}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:#0C1828;border:1px solid rgba(255,255,255,.1);border-radius:20px 20px 0 0;padding:22px 18px 42px;width:100%;max-width:480px;box-shadow:0 -8px 40px rgba(0,0,0,.6)}
.modal h3{text-align:center;font-size:.95rem;font-weight:700;margin-bottom:18px;color:#fff}
.step-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:22px;direction:rtl}
.tcol{text-align:center;min-width:76px}
.tcol .f{font-size:2.2rem}
.tcol .n{font-size:.75rem;font-weight:600;margin-top:3px;direction:rtl;color:var(--text)}
.stepper{display:flex;flex-direction:column;align-items:center;gap:7px}
.sb{width:44px;height:44px;border-radius:50%;border:1.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);font-size:1.4rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff}
.sn{font-size:2.6rem;font-weight:900;color:#fff;min-width:42px;text-align:center}
.colon{font-size:1.6rem;font-weight:700;color:var(--muted)}
.mbtns{display:flex;gap:10px}
.btn-x{flex:1;padding:13px;border:1px solid rgba(255,255,255,.12);border-radius:11px;background:rgba(255,255,255,.05);font-size:.9rem;font-weight:600;cursor:pointer;color:var(--muted)}
.btn-s{flex:2;padding:13px;background:linear-gradient(135deg,var(--blue),var(--blue2));border:none;border-radius:11px;color:#fff;font-size:.9rem;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(21,101,192,.3)}
.empty{text-align:center;padding:36px 20px;color:var(--muted)}

/* ── SPECIAL BETS ── */
.sp-card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.25)}
.sp-head{padding:12px 14px 4px;display:flex;align-items:center;gap:8px}
.sp-icon{font-size:1.5rem}
.sp-title{font-weight:700;font-size:.88rem;color:var(--text)}
.sp-pts{margin-right:auto;background:rgba(255,215,0,.12);color:var(--gold);padding:2px 9px;border-radius:12px;font-size:.7rem;font-weight:700;border:1px solid rgba(255,215,0,.2)}
.sp-body{padding:8px 14px 14px}
.sp-pick{width:100%;padding:11px 14px;border:1px solid rgba(255,255,255,.1);border-radius:10px;background:rgba(255,255,255,.04);font-size:.88rem;font-weight:600;cursor:pointer;text-align:right;display:flex;justify-content:space-between;align-items:center;color:var(--text)}
.sp-pick.chosen{border-color:rgba(21,101,192,.6);background:rgba(21,101,192,.15);color:#42A5F5}
.sp-pick.correct{border-color:rgba(0,200,81,.5);background:rgba(0,200,81,.1);color:var(--green)}
.sp-pick.wrong{border-color:rgba(232,0,61,.4);background:rgba(232,0,61,.1);color:#FF4444}
.sp-input{width:100%;padding:11px 14px;border:1px solid rgba(255,255,255,.1);border-radius:10px;font-size:.88rem;text-align:right;outline:none;font-family:inherit;background:rgba(255,255,255,.04);color:#fff}
.sp-input:focus{border-color:rgba(21,101,192,.5);box-shadow:0 0 0 2px rgba(21,101,192,.15)}
.sp-hint{font-size:.68rem;color:var(--muted);margin-top:5px;text-align:right}
.sp-final{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center}
.sp-vs{text-align:center;font-weight:700;color:var(--muted)}

/* ── CHAT ── */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 160px);padding:0!important}
.chat-topbar{background:linear-gradient(90deg,#060D1C,#0D1F3C);color:#fff;padding:9px 14px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;border-bottom:1px solid rgba(21,101,192,.3)}
.chat-topbar h3{font-size:.88rem;font-weight:700}
.chat-status{font-size:.68rem;opacity:.7}
.chat-roomcode{background:rgba(255,215,0,.12);padding:3px 8px;border-radius:8px;font-size:.68rem;cursor:pointer;font-weight:700;color:var(--gold);border:1px solid rgba(255,215,0,.2)}
.chat-msgs{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:2px;background:#07101E}
.chat-bar{display:flex;gap:8px;align-items:flex-end;padding:8px 10px;background:#060D1C;flex-shrink:0;border-top:1px solid rgba(255,255,255,.06)}
.chat-input{flex:1;padding:10px 14px;border:1px solid rgba(255,255,255,.1);border-radius:22px;font-size:.9rem;outline:none;font-family:inherit;resize:none;max-height:100px;background:rgba(255,255,255,.07);color:#fff;line-height:1.4}
.chat-input::placeholder{color:var(--muted)}
.send-btn{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#25D366,#128C7E);border:none;color:#fff;font-size:1.3rem;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.send-btn:active{opacity:.8}
.msg-wrap{display:flex;flex-direction:column;max-width:78%;margin-bottom:1px}
.msg-wrap.me{align-self:flex-end;align-items:flex-end}
.msg-wrap.other{align-self:flex-start;align-items:flex-start}
.msg-name{font-size:.64rem;font-weight:700;color:#42A5F5;margin-bottom:2px;padding-right:6px}
.msg-bubble{padding:7px 11px 18px;border-radius:12px;font-size:.88rem;line-height:1.45;word-break:break-word;position:relative;min-width:60px}
.msg-wrap.me .msg-bubble{background:#1B4D2E;color:#E8F5E9;border-bottom-right-radius:3px}
.msg-wrap.other .msg-bubble{background:#0F1E35;color:var(--text);border-bottom-left-radius:3px;border:1px solid var(--border)}
.msg-time{position:absolute;bottom:3px;left:9px;font-size:.6rem;color:rgba(255,255,255,.3);white-space:nowrap}
.msg-wrap.me .msg-time{left:auto;right:9px}
.date-sep{text-align:center;margin:8px 0;font-size:.68rem;color:var(--muted)}
.date-sep span{background:rgba(255,255,255,.06);padding:3px 12px;border-radius:10px}
.typing-indicator{font-size:.72rem;color:var(--muted);padding:4px 12px;align-self:flex-start}

.chat-setup{padding:28px 20px;text-align:center}
.chat-setup h2{font-size:1.3rem;font-weight:800;margin-bottom:6px;color:#fff}
.code-input{width:100%;max-width:200px;padding:13px;border:1.5px solid rgba(255,255,255,.15);border-radius:12px;font-size:1.4rem;text-align:center;letter-spacing:.2em;font-weight:700;outline:none;text-transform:uppercase;background:rgba(255,255,255,.06);color:#fff}
.code-input:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(255,215,0,.15)}
.msg-badge{position:absolute;top:-4px;right:-4px;background:#E8003D;color:#fff;font-size:.6rem;font-weight:800;border-radius:10px;padding:1px 5px;min-width:16px;text-align:center}

/* ── TEAM PICKER ── */
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;max-height:55vh;overflow-y:auto;margin-bottom:12px}
.tpick{padding:9px 6px;border:1px solid rgba(255,255,255,.1);border-radius:9px;background:rgba(255,255,255,.04);font-size:.76rem;font-weight:600;cursor:pointer;text-align:center;color:var(--text)}
.tpick.sel{border-color:rgba(21,101,192,.6);background:rgba(21,101,192,.2);color:#42A5F5}

/* ── MISC ── */
.pred-btn.locked{background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--border);cursor:not-allowed}
.streak-badge{display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,#E8003D,#FF6B35);color:#fff;border-radius:20px;padding:4px 12px;font-size:.75rem;font-weight:800;margin:6px auto}
.confetti-piece{position:fixed;top:-10px;width:10px;height:10px;pointer-events:none;z-index:9999;animation:confettiFall linear forwards}
.big-pts.animate{animation:countUp .6s cubic-bezier(.34,1.56,.64,1)}
.notif-banner{position:fixed;top:55px;left:50%;transform:translateX(-50%);max-width:440px;width:92%;background:linear-gradient(135deg,#0D1F3C,#1565C0);color:#fff;padding:10px 16px;border-radius:12px;font-size:.82rem;font-weight:600;z-index:300;box-shadow:0 4px 24px rgba(21,101,192,.4);display:flex;align-items:center;gap:10px;animation:slideDown .4s ease;border:1px solid rgba(21,101,192,.4)}

/* ── GROUP STANDINGS ── */
.standings-wrap{margin-top:12px}
.st-group{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.25)}
.st-head{background:linear-gradient(90deg,rgba(232,0,61,.5),rgba(21,101,192,.4));color:#fff;padding:7px 12px;font-size:.78rem;font-weight:700;display:flex;align-items:center;gap:6px;border-bottom:1px solid rgba(255,255,255,.06)}
.st-row{display:grid;grid-template-columns:24px 1fr repeat(5,30px);align-items:center;padding:6px 10px;border-bottom:1px solid var(--border);font-size:.72rem;gap:4px}
.st-row:last-child{border-bottom:none}
.st-row.qualify{background:rgba(0,200,81,.06)}
.st-row.header{background:rgba(255,255,255,.03);font-weight:700;font-size:.68rem;color:var(--muted)}
.st-pos{font-weight:800;text-align:center;color:#fff}
.st-name{font-weight:600;direction:rtl;color:var(--text)}
.st-num{text-align:center;color:var(--muted)}
.st-pts{text-align:center;font-weight:800;color:var(--gold)}

/* ── KNOCKOUT BRACKET ── */
.ko-section{margin-bottom:16px}
.ko-head{background:linear-gradient(135deg,rgba(13,31,60,.9),rgba(21,101,192,.5));color:#fff;border-radius:10px 10px 0 0;padding:8px 14px;font-size:.8rem;font-weight:700;display:flex;justify-content:space-between;align-items:center;border:1px solid rgba(21,101,192,.3);border-bottom:none}
.ko-pts-badge{background:rgba(255,215,0,.15);color:var(--gold);border-radius:10px;padding:2px 8px;font-size:.7rem;border:1px solid rgba(255,215,0,.2)}
.ko-slots{background:var(--card);border-radius:0 0 10px 10px;padding:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px;box-shadow:0 4px 16px rgba(0,0,0,.3);border:1px solid rgba(21,101,192,.2);border-top:none}
.ko-slot{border:1.5px dashed rgba(21,101,192,.35);border-radius:9px;padding:9px 8px;text-align:center;cursor:pointer;font-size:.76rem;color:var(--muted);min-height:48px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:all .2s;background:rgba(255,255,255,.02)}
.ko-slot.filled{border-color:rgba(21,101,192,.6);border-style:solid;background:rgba(21,101,192,.12);color:#42A5F5;font-weight:700}
.ko-slot.correct{border-color:rgba(0,200,81,.5);background:rgba(0,200,81,.08);color:var(--green)}
.ko-slot.wrong{border-color:rgba(232,0,61,.4);background:rgba(232,0,61,.08);color:#FF4444}
.ko-slot-flag{font-size:1.3rem;line-height:1}
.ko-slot-name{font-size:.68rem;font-weight:600}
.ko-save-btn{width:100%;margin-top:10px;padding:12px;background:linear-gradient(135deg,#FFD700,#FF8C00);color:#080e1a;border:none;border-radius:10px;font-size:.9rem;font-weight:800;cursor:pointer;box-shadow:0 4px 16px rgba(255,140,0,.3)}
</style>
</head>

function buildBgPattern() {
  const el = document.getElementById('bgPattern');
  if (!el) return;
  const icons = [_SVG_TROPHY, _SVG_BALL, _SVG_BEER];
  const sizes = [[72,120],[88,88],[76,102]];
  const cellW = 140, cellH = 125;
  const vw = Math.max(window.innerWidth, 480);
  const vh = window.innerHeight + 100;
  const cols = Math.ceil(vw / cellW) + 2;
  const rows = Math.ceil(vh / cellH) + 2;
  const rotations = [-14,-8,-4,0,4,8,13,17,-18,-10,-6,2,6,10,-3];
  let html = '';
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const idx = (r * 3 + c * 2) % 3;
      const [iw, ih] = sizes[idx];
      const stagger = (r % 2) * (cellW / 2);
      const x = c * cellW + stagger - cellW * 0.5;
      const y = r * cellH - cellH * 0.3;
      const rot = rotations[(r * 5 + c * 7) % rotations.length];
      html += `<div style="position:absolute;left:${x}px;top:${y}px;width:${iw}px;height:${ih}px;transform:rotate(${rot}deg)">${icons[idx]}</div>`;
    }
  }
  el.innerHTML = html;
}

const _pnNorm=s=>s.normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase().trim();
const _pnMap=Object.fromEntries(Object.entries(PLAYER_EN2HE).map(([k,v])=>[_pnNorm(k),v]));

// תעתוק אנגלית→עברית כ-fallback לשמות לא מוכרים
function _translit(name){
  return name.split(' ').map(w=>{
    if(!w)return '';
    if(/[א-ת]/.test(w))return w; // כבר עברית
    let s=w.toLowerCase()
      // סיומות נפוצות בתחילה
      .replace(/ez$/,'ז').replace(/oz$/,'וז').replace(/inha$/,'יניה')
      // תבניות רב-אותיות — סדר קריטי
      .replace(/sch/g,'ש').replace(/sh/g,'ש')
      .replace(/tch/g,'צ\'').replace(/tion/g,'שן').replace(/th/g,'ת')
      .replace(/ch/g,'צ\'').replace(/ph/g,'פ')
      .replace(/ck/g,'ק').replace(/qu/g,'ק').replace(/gh/g,'')
      .replace(/wh/g,'ו').replace(/ng(?=s?$)/g,'נג').replace(/nk/g,'נק')
      .replace(/ll/g,'י').replace(/ñ/g,'נ').replace(/nh/g,'נ').replace(/rr/g,'ר')
      // צרפתית
      .replace(/eau/g,'ו').replace(/eux/g,'ה').replace(/eux$/g,'ו')
      // פורטוגזית
      .replace(/ão/g,'אוו').replace(/ãe/g,'אין')
      // צירופי תנועות
      .replace(/igh/g,'אי').replace(/igh/g,'אי')
      .replace(/ee|ea/g,'י').replace(/ie(?!r)/g,'י')
      .replace(/oo|ou/g,'ו').replace(/oi|oy/g,'וי')
      .replace(/ai|ay/g,'יי').replace(/au|aw/g,'או')
      // H: בתחילת מילה→ה, אחרת שקט
      .replace(/^h/,'ה').replace(/h/g,'')
      // עיצורים
      .replace(/b/g,'ב')
      .replace(/c(?=[eiy])/g,'ס').replace(/c/g,'ק')
      .replace(/d/g,'ד').replace(/f/g,'פ')
      .replace(/g(?=[ei])/g,'ח').replace(/g/g,'ג')
      .replace(/j/g,'ח').replace(/k/g,'ק').replace(/l/g,'ל')
      .replace(/m/g,'מ').replace(/n/g,'נ').replace(/p/g,'פ')
      .replace(/q/g,'ק').replace(/r/g,'ר').replace(/s/g,'ס')
      .replace(/t/g,'ט').replace(/v/g,'ו').replace(/w/g,'ו')
      .replace(/x/g,'קס').replace(/y(?=[aeiou])/g,'י').replace(/y/g,'י')
      .replace(/z/g,'ז')
      // תנועות
      .replace(/aa/g,'א').replace(/a/g,'א')
      .replace(/e$/g,'').replace(/e/g,'ה')
      .replace(/i/g,'י').replace(/o/g,'ו').replace(/u/g,'ו')
      .replace(/[a-z]/g,'')
      // אותיות סופיות
      .replace(/נ$/,'ן').replace(/מ$/,'ם').replace(/פ$/,'ף')
      .replace(/כ$/,'ך').replace(/צ$/,'ץ');
    return s||w;
  }).join(' ');
}

function pn(name){
  if(!name)return name;
  if(PLAYER_EN2HE[name])return PLAYER_EN2HE[name];
  const n=_pnNorm(name);
  if(_pnMap[n])return _pnMap[n];
  // fallback: תעתוק אוטומטי לשמות לא מוכרים
  if(/[a-zA-Z]/.test(name))return _translit(name);
  return name;
}

// מתרגם מחרוזת "Name 58' | Name2 72'"
function translateSc(str){
  if(!str)return str;
  return str.split('|').map(seg=>{
    const s=seg.trim();
    const sp=s.lastIndexOf(' ');
    const isMin=sp>0&&/^\d+[׳'+]?$/.test(s.slice(sp+1));
    if(isMin){const nm=s.slice(0,sp),mn=s.slice(sp+1);return pn(nm)+(mn?' '+mn:'');}
    return pn(s);
  }).join(' | ');
}

// זיהוי מצב משחק לפי שעת ישראל (UTC+3)
function matchStatus(m){
  const now=new Date();
  const ist=new Date(now.getTime()+(now.getTimezoneOffset()+180)*60000);
  const [yr,mo,dy]=m.d.split('-').map(Number);
  const [hr,mn]=m.t.split(':').map(Number);
  const kick=new Date(yr,mo-1,dy,hr,mn,0);
  const diff=(ist-kick)/60000;
  if(diff < -2)  return 'pre';
  if(diff <= 115) return 'in';
  return 'post';
}

function eName(t){
  if(!t) return '';
  return EN2HE[t.displayName]||EN2HE[t.shortDisplayName]||EN2HE[t.name]||'';
}

// מעבד אירועי ESPN — משותף לחי ולעבר
function processEspnEvents(events, d, isLive){
  let hasLive=false;
  events.forEach(ev=>{
    const comp=ev.competitions?.[0]; if(!comp) return;
    const eH=comp.competitors?.find(c=>c.homeAway==='home');
    const eA=comp.competitors?.find(c=>c.homeAway==='away');
    if(!eH||!eA) return;
    const nH=eName(eH.team), nA=eName(eA.team);
    let match=M.find(m=>nH&&nA&&m.h.includes(nH)&&m.a.includes(nA));
    let flip=false;
    if(!match){match=M.find(m=>nH&&nA&&m.h.includes(nA)&&m.a.includes(nH));flip=true;}
    if(!match) return;
    const st=ev.status?.type?.state;
    const min=ev.status?.displayClock||'?';
    const sH=parseInt(eH.score)||0, sA=parseInt(eA.score)||0;
    const myH=flip?sA:sH, myA=flip?sH:sA;
    const buildSc=(teamId,idx)=>(comp.details||[])
      .filter(e=>e.type?.text?.toLowerCase().includes('goal')&&e.team?.id===teamId&&!e.ownGoal&&(e.athletesInvolved?.length||0)>idx)
      .map(e=>{
        const nm=pn(e.athletesInvolved[idx]?.displayName||'');
        const min=e.clock?.displayValue||'';
        return nm?(nm+(min?' '+min:'')):''
      }).filter(Boolean).join(' | ');
    const rawH=buildSc(eH.team?.id,0), rawA=buildSc(eA.team?.id,0);
    const rawAH=buildSc(eH.team?.id,1), rawAA=buildSc(eA.team?.id,1);
    const scorers=flip?{h:rawA,a:rawH}:{h:rawH,a:rawA};
    const assists=flip?{h:rawAA,a:rawAH}:{h:rawAH,a:rawAA};
    if(st==='in'&&isLive){
      const wasLive=!!d.live[match.id];
      d.live[match.id]={h:myH,a:myA,min,scorers};
      if(!wasLive){
        sendNotif('⚽ משחק התחיל!',`${tn(match.h)} נגד ${tn(match.a)}`);
        showBanner(`⚽ ${tn(match.h)} נגד ${tn(match.a)} — התחיל!`,'🔴');
      }
      hasLive=true;
    } else if(st==='post'){
      const wasLive=!!d.live[match.id];
      const espnHomeWins=flip?eA.winner===true:eH.winner===true;
      const espnAwayWins=flip?eH.winner===true:eA.winner===true;
      const isKO=['R32','R16','QF','SF','F3','F'].includes(match.g);
      if(!match.r&&!d.results[match.id]){
        let res={h:myH,a:myA};
        if(isKO&&myH===myA){
          if(espnHomeWins) res.pen='h';
          else if(espnAwayWins) res.pen='a';
        }
        d.results[match.id]=res;
      } else if(!match.r&&d.results[match.id]&&!d.results[match.id].pen&&isKO){
        // תוצאה קיימת בלי pen — נוסיף מנצח פנדלים מ-ESPN
        const ex=d.results[match.id];
        if(ex.h===ex.a){
          if(espnHomeWins) d.results[match.id]={...ex,pen:'h'};
          else if(espnAwayWins) d.results[match.id]={...ex,pen:'a'};
        }
      }
      if(scorers) d.scorers[match.id]=scorers;
      if(assists.h||assists.a) d.assists[match.id]=assists;
      if(wasLive&&isLive){
        sendNotif('✅ סיום משחק!',`${tn(match.h)} ${myH}:${myA} ${tn(match.a)}`);
        showBanner(`✅ ${tn(match.h)} ${myH}:${myA} ${tn(match.a)} — סיום`,'🏁');
      }
      delete d.live[match.id];
    } else if(isLive){
      delete d.live[match.id];
    }
  });
  return hasLive;
}

// ממיר תאריך+שעה ישראל (UTC+3) לתאריך ESPN (UTC)
function toEspnDate(mDate,mTime){
  const [yy,mm,dd]=mDate.split('-').map(Number);
  const [hh,mi]=(mTime||'12:00').split(':').map(Number);
  const utc=new Date(Date.UTC(yy,mm-1,dd,hh-3,mi));
  return utc.toISOString().split('T')[0].replace(/-/g,'');
}

// מביא תוצאות מתאריכים קודמים שעדיין חסרות (מנסה שוב כל 4 דקות)
let _lastPastFetch=0;
async function fetchPastResults(d){
  if(Date.now()-_lastPastFetch < 2*60*1000) return;
  _lastPastFetch=Date.now();
  const now=new Date();
  const ist=new Date(now.getTime()+(now.getTimezoneOffset()+180)*60000);
  const todayStr=ist.toISOString().split('T')[0];
  const pastDates=[...new Set(
    M.filter(m=>m.d<todayStr&&(!d.results[m.id]&&!m.r||!d.scorers[m.id]||!d.assists[m.id])).map(m=>toEspnDate(m.d,m.t))
  )].sort();
  for(const date of pastDates){
    try{
      const r=await fetch(
        `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${date.replace(/-/g,'')}`,
        {signal:AbortSignal.timeout(8000)}
      );
      const data=await r.json();
      processEspnEvents(data.events||[],d,false);
    }catch(e){console.log('ESPN past:',e.message);}
  }
}

async function fetchLive(){
  const d=gd(); let hasLive=false;
  // זיהוי לפי שעה (גיבוי אם ESPN נכשל)
  M.forEach(m=>{
    if(d.results[m.id]) return;
    const st=matchStatus(m);
    if(st==='in'){
      if(!d.live[m.id]||d.live[m.id].timebased)
        d.live[m.id]={h:0,a:0,min:'?',timebased:true};
      hasLive=true;
    } else if(st==='post'&&d.live[m.id]&&d.live[m.id].timebased){
      delete d.live[m.id];
    }
  });
  // אחזר תוצאות ישנות חסרות (פעם אחת בלבד)
  await fetchPastResults(d);
  // תאריך לפי שעון ישראל (UTC+3) — חשוב למשחקי לילה
  const _now=new Date();
  const _ist=new Date(_now.getTime()+(_now.getTimezoneOffset()+180)*60000);
  const today=_ist.toISOString().split('T')[0].replace(/-/g,'');
  const yesterdayStr=new Date(_ist.getTime()-86400000).toISOString().split('T')[0];
  const yest=yesterdayStr.replace(/-/g,'');
  // אחזר היום
  try{
    const r=await fetch(
      `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${today}`,
      {signal:AbortSignal.timeout(8000)}
    );
    const data=await r.json();
    const lv=processEspnEvents(data.events||[],d,true);
    if(lv) hasLive=true;
  }catch(e){console.log('ESPN היום:',e.message);}
  // משחקי לילה — אתמול ישראל + היום ישראל שב-ESPN תחת תאריך UTC שונה (01:00-02:00 ישראל)
  const todayIL=_ist.toISOString().split('T')[0];
  const extraEspnDates=[...new Set([
    ...M.filter(m=>m.d===yesterdayStr&&!d.results[m.id]&&!m.r).map(m=>toEspnDate(m.d,m.t)),
    ...M.filter(m=>m.d===todayIL&&!d.results[m.id]&&!m.r&&toEspnDate(m.d,m.t)!==today).map(m=>toEspnDate(m.d,m.t))
  ])];
  for(const ed of extraEspnDates){
    try{
      const r2=await fetch(
        `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${ed}`,
        {signal:AbortSignal.timeout(8000)}
      );
      const data2=await r2.json();
      processEspnEvents(data2.events||[],d,false);
    }catch(e){console.log('ESPN לילה:',e.message);}
  }
  sd(d);
  const bar=document.getElementById('liveBar');
  bar.classList.toggle('on',hasLive);
  if(hasLive){
    const names=M.filter(m=>d.live[m.id]).map(m=>tn(m.h)+' - '+tn(m.a)).join(' | ');
    document.getElementById('liveLabel').textContent=names;
  }
  // עדכן שעת עדכון אחרון
  const _updEl=document.getElementById('lastUpdated');
  if(_updEl) _updEl.textContent=_ist.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  startRefreshCountdown();
  checkUpcomingNotif();
  checkNewBets();
  renderMatches();
  renderStats();   // ניקוד אישי — תמיד
  renderBoard();   // טבלה + bracket + בתים — תמיד
  if(document.querySelector('.screen.active')?.id==='sKings') renderKings();
  else renderKings(false); // כוביש שערים/בישולים — רענן cache ברקע
}

function pts(p,r){
  if(p.h===r.h&&p.a===r.a) return 3;
  const pw=p.h>p.a?1:p.h<p.a?-1:0, rw=r.h>r.a?1:r.h<r.a?-1:0;
  return pw===rw?1:0;
}

// ניקוד הימורים מיוחדים
function specialPts(u){
  const d=gd(), p=d.specials?.[u]||{}, r=d.specialResults||{};
  let total=0;
  if(r.winner && p.winner===r.winner) total+=10;
  if(r.scorer && p.scorer && p.scorer.trim()===r.scorer.trim()) total+=5;
  if(r.golden && p.golden && p.golden.trim()===r.golden.trim()) total+=5;
  // גמר — סדר לא משנה
  const pF=[p.final1,p.final2].filter(Boolean);
  const rF=[r.final1,r.final2].filter(Boolean);
  pF.forEach(t=>{ if(rF.includes(t)) total+=4; });
  return total;
}

function uPts(u){
  const d=gd(),ps=d.users[u]?.p||{},rs=d.results||{};
  const matchPts=Object.keys(ps).reduce((s,id)=>s+(rs[id]?pts(ps[id],rs[id]):0),0);
  // נקודות נוקאאוט
  const myKo=d.knockout?.[u]||{}, koRes=d.koResults||{};
  let koPts=0;
  KO_ROUNDS.forEach(rnd=>{
    const picks=myKo[rnd.key]||[], res=koRes[rnd.key]||[];
    picks.forEach(t=>{if(t&&res.includes(t))koPts+=rnd.pts;});
  });
  return matchPts+specialPts(u)+streakBonus(u)+koPts;
}

// ── KNOCKOUT SLOT HELPERS (גלובלי) ──────────────────────
const KO_FEED={
  89:{h:75,a:78}, 90:{h:73,a:76}, 91:{h:84,a:83}, 92:{h:82,a:81},
  93:{h:74,a:77}, 94:{h:79,a:80}, 95:{h:87,a:86}, 96:{h:85,a:88},
  97:{h:89,a:90}, 98:{h:91,a:92},
  99:{h:93,a:94}, 100:{h:95,a:96},
  101:{h:97,a:98}, 102:{h:99,a:100},
  104:{h:101,a:102}, 103:{h:101,a:102,loser:true}
};
function koGetRes(id){
  const d=gd(),m=M.find(x=>x.id===id);
  const r=(d.results||{})[id]||(d.live||{})[id]||m?.r||null;
  if(r&&!r.pen&&m?.r?.pen) return Object.assign({},r,{pen:m.r.pen});
  return r;
}
function koWinner(id,loser=false){
  const m=M.find(x=>x.id===id),r=koGetRes(id);
  if(!m||!r) return null;
  const homeW=r.pen?r.pen==='h':r.h>r.a, awayW=r.pen?r.pen==='a':r.a>r.h;
  if(!homeW&&!awayW) return null;
  return loser?(homeW?m.a:m.h):(homeW?m.h:m.a);
}
function koDesc(matchId,depth){
  if(depth>=2) return '...';
  const feed=KO_FEED[matchId];
  if(!feed){const m=M.find(x=>x.id===matchId);return m?fl(m.h)+tn(m.h)+'×'+fl(m.a)+tn(m.a):'?';}
  const hw=koWinner(feed.h),aw=koWinner(feed.a);
  const hD=hw?fl(hw)+tn(hw):'('+koDesc(feed.h,depth+1)+')';
  const aD=aw?fl(aw)+tn(aw):'('+koDesc(feed.a,depth+1)+')';
  return hD+' × '+aD;
}
function koSlotDisplay(matchId,slot){
  const feed=KO_FEED[matchId];
  if(!feed){const m=M.find(x=>x.id===matchId);return m?(slot==='h'?m.h:m.a):'🏳️ ?';}
  const srcId=feed[slot];
  const w=koWinner(srcId,!!feed.loser);
  if(w) return w;
  return '🏳️ מנ׳ '+koDesc(srcId,0);
}

let _cdInterval=null;
function startCountdown(){
  if(_cdInterval) clearInterval(_cdInterval);
  function tick(){
    const d=gd(),rs=d.results||{},lv=d.live||{};
    const now=Date.now();
    const next=M.filter(m=>!rs[m.id]&&!lv[m.id]&&!m.r).map(m=>{
      const [hh,mi]=m.t.split(':').map(Number);
      const dt=new Date(m.d+'T'+String(hh-3).padStart(2,'0')+':'+String(mi).padStart(2,'0')+':00Z');
      return{m,ms:dt.getTime()};
    }).filter(x=>x.ms>now).sort((a,b)=>a.ms-b.ms)[0];
    const bar=document.getElementById('countdownBar');
    if(!bar) return;
    if(!next){bar.style.display='none';return;}
    const diff=next.ms-now;
    const hh=Math.floor(diff/3600000),mm=Math.floor(diff%3600000/60000),ss=Math.floor(diff%60000/1000);
    const pad=n=>String(n).padStart(2,'0');
    checkUpcomingNotif();
    bar.style.display='block';
    bar.innerHTML=`<span style="font-size:.68rem;color:rgba(255,200,0,.7)">⏳ ההימור הבא נסגר בעוד</span><br><span style="font-size:1.2rem;font-weight:900;color:#FFD700;letter-spacing:2px">${pad(hh)}:${pad(mm)}:${pad(ss)}</span><span style="font-size:.68rem;color:rgba(255,255,255,.5);margin-right:8px"> | ${fl(next.m.h)}${tn(next.m.h)} – ${fl(next.m.a)}${tn(next.m.a)}</span>`;
  }
  tick();
  _cdInterval=setInterval(tick,1000);
}

      const aSc=translateSc(typeof sc_data==='object'?(sc_data.a||''):'');

      const homeScHtml = isLive ? mkSc(liveSc.h,' live') : mkSc(hSc);

      // ── badge ──
      let badge='', footR='';
      if(p&&r){
        const pt=pts(p,r);

        <div class="mc-bot">${badge}${footR}</div>
        ${viewBtn}${predsSection}

function restoreData(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const parsed=JSON.parse(ev.target.result);
      if(!parsed.backup||!parsed.data) throw new Error('קובץ לא תקין');
      if(!confirm('זה ישחזר את כל הנתונים ויחליף את המידע הנוכחי. להמשיך?')) return;
      sd(parsed.data);
      showBanner('✅ הגיבוי שוחזר בהצלחה!','💾',3000);
      renderMatches(); renderBoard(); renderStats(); renderAdmin();
    }catch(err){ alert('שגיאה בקריאת הקובץ: '+err.message); }
  };
  reader.readAsText(file);
}

function _parseScNames(str){
  if(!str)return[];
  return str.split('|').map(s=>{
    const seg=s.trim();
    const ls=seg.lastIndexOf(' ');
    const isMin=ls>0&&/^\d+['׳+]?$/.test(seg.slice(ls+1));
    return isMin?seg.slice(0,ls).trim():seg;
  }).filter(Boolean);
}

let _kingsHTML='';
async function renderKings(scrollTop=false){
  const el=document.getElementById('kingsView');
  el.style.overflowAnchor='none';
  if(scrollTop) window.scrollTo(0,0);
  if(_kingsHTML) el.innerHTML=_kingsHTML;
  else el.innerHTML='<div style="text-align:center;padding:30px;color:var(--muted);font-size:.85rem">טוען נתונים...</div>';

  // מפה קבוצה-אנגלית → {flag, team-עברית} מתוך M
  const flagMap={};
  M.forEach(m=>{
    flagMap[tn(m.h)]={flag:fl(m.h),team:tn(m.h)};
    flagMap[tn(m.a)]={flag:fl(m.a),team:tn(m.a)};
  });
  function teamInfoFromEspn(espnTeam){
    if(!espnTeam||!espnTeam.displayName) return null;
    const heName=EN2HE[espnTeam.displayName]||EN2HE[espnTeam.abbreviation]||null;
    if(!heName) return null;
    return flagMap[heName]||{flag:'',team:heName};
  }

  let scorerRows=[], assistRows=[], fetchOk=false, errMsg='';
  try{
    const r=await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/statistics',{signal:AbortSignal.timeout(10000)});
    const data=await r.json();
    for(const stat of (data.stats||[])){
      const leaders=stat.leaders||[];
      const rows=leaders
        .filter(l=>(l.value||0)>=2)
        .map(l=>{
          const ath=l.athlete||{};
          const heName=pn(ath.displayName)||ath.displayName||'?';
          const info=teamInfoFromEspn(ath.team||{});
          return{name:heName, count:Math.round(l.value), info};
        });
      if(stat.name==='goalsLeaders') scorerRows=rows;
      else if(stat.name==='assistsLeaders') assistRows=rows;
    }
    fetchOk=true;
  }catch(e){
    errMsg=e.message;
    console.log('ESPN kings:',e.message);
  }

  const medals=['🥇','🥈','🥉'];
  function buildTable(rows, countLabel){
    if(!rows.length) return`<div style="text-align:center;color:var(--muted);padding:18px;font-size:.8rem">${fetchOk?'אין שחקנים עם 2+ עדיין':('שגיאה: '+errMsg)}</div>`;
    return`<table style="width:100%;border-collapse:collapse">
      <thead><tr style="font-size:.62rem;color:var(--muted);border-bottom:1px solid var(--border)">
        <td style="padding:4px 4px;width:28px"></td>
        <td style="padding:4px 6px;text-align:right">שחקן</td>
        <td style="padding:4px 6px;text-align:right">נבחרת</td>
        <td style="padding:4px 6px;text-align:center;width:44px">${countLabel}</td>
      </tr></thead>
      <tbody>${rows.map((row,i)=>`
        <tr style="border-bottom:1px solid rgba(255,255,255,.05)">
          <td style="padding:8px 4px;font-size:${i<3?'1rem':'.75rem'};text-align:center">${medals[i]||i+1}</td>
          <td style="padding:8px 6px;text-align:right;font-size:.82rem;font-weight:600;color:var(--text)">${row.name}</td>
          <td style="padding:8px 6px;text-align:right;font-size:.7rem;color:var(--muted)">${row.info?row.info.flag+' '+row.info.team:''}</td>
          <td style="padding:8px 6px;text-align:center;font-size:1.2rem;font-weight:900;color:var(--gold)">${row.count}</td>
        </tr>`).join('')}
      </tbody></table>`;
  }

  const now=new Date();
  const ist=new Date(now.getTime()+(now.getTimezoneOffset()+180)*60000);
  const updStr=ist.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
  el.innerHTML=`
    <div style="text-align:center;font-size:.65rem;color:var(--muted);margin-bottom:10px">📡 ESPN | עודכן ${updStr} | מתעדכן כל דקה</div>
    <div style="background:var(--card);border-radius:14px;padding:14px 10px;margin-bottom:14px">
      <div style="font-size:.88rem;font-weight:800;color:var(--gold);margin-bottom:10px;text-align:right">⚽ מלכי שערים</div>
      ${buildTable(scorerRows,'שערים')}
    </div>
    <div style="background:var(--card);border-radius:14px;padding:14px 10px">
      <div style="font-size:.88rem;font-weight:800;color:#64B5F6;margin-bottom:10px;text-align:right">🅰️ מלכי בישולים</div>
      ${buildTable(assistRows,'בישולים')}
    </div>`;
  _kingsHTML=el.innerHTML;
  if(scrollTop) window.scrollTo(0,0);
}

function scaleBkt(){
  const inner=document.getElementById('bktInner');
  const wrap=document.getElementById('bktWrap');
  if(!inner||!wrap)return;
  inner.style.zoom='';
  inner.style.marginLeft='';
  wrap.style.overflow='visible';
  const viewW=window.innerWidth||1024;
  const natW=inner.offsetWidth||inner.scrollWidth;
  if(!natW)return;
  const avail=viewW-20;
  const s=Math.min(1,avail/natW);
  if(s<1)inner.style.zoom=s.toFixed(4);
  const displayedW=natW*s;
  const bodyLeft=document.body.getBoundingClientRect().left;
  inner.style.marginLeft=((viewW-displayedW)/2-bodyLeft).toFixed(1)+'px';
}

function buildBoardKnockout(){
  const d=gd(), rs=d.results||{}, lv=d.live||{};
  function getRes(id){ const m=M.find(x=>x.id===id); const r=rs[id]||lv[id]||m?.r||null; if(r&&!r.pen&&m?.r?.pen) return Object.assign({},r,{pen:m.r.pen}); return r; }
  function isLive(id){ return !!lv[id]&&!rs[id]; }
  function getMatch(id){ return M.find(x=>x.id===id); }

  const SH={'דרום אפריקה':'ד. אפריקה','חוף שנהב':'ח. שנהב','קאבו ורדה':'ק. ורדה'};
  const sh=n=>SH[n]||n;

  const H=560, CW=90, CH=50, SW=16, SC=12, CW_CTR=98;

  // מפת מקורות: לכל משחק R16+ — מי הקבוצות שמגיעות מהשלב הקודם
  const FEED={
    89:{h:75,a:78}, 90:{h:73,a:76}, 91:{h:84,a:83}, 92:{h:82,a:81},
    93:{h:74,a:77}, 94:{h:79,a:80}, 95:{h:87,a:86}, 96:{h:85,a:88},
    97:{h:89,a:90}, 98:{h:91,a:92},
    99:{h:93,a:94}, 100:{h:95,a:96},
    101:{h:97,a:98}, 102:{h:99,a:100},
    104:{h:101,a:102}, 103:{h:101,a:102,loser:true}
  };

  function getWinner(id){
    const m=getMatch(id), r=getRes(id);
    if(!m||!r) return null;
    if(r.pen) return r.pen==='h'?m.h:r.pen==='a'?m.a:null;
    return r.h>r.a?m.h:r.a>r.h?m.a:null;
  }

  function teamFor(matchId, slot){
    const feed=FEED[matchId];
    if(!feed){ const m=getMatch(matchId); return m?(slot==='h'?m.h:m.a):'🏳️ ?'; }
    const srcId=feed[slot];
    const t=feed.loser
      ? (()=>{const m=getMatch(srcId),r=getRes(srcId); if(!m||!r) return null; if(r.pen) return r.pen==='h'?m.a:m.h; return r.h>r.a?m.a:r.a>r.h?m.h:null;})()
      : getWinner(srcId);
    return t||'🏳️ ?';
  }

  function card(id){
    const h=teamFor(id,'h'), a=teamFor(id,'a');
    const tbd=tn(h)==='?'&&tn(a)==='?';
    if(tbd) return `<div style="border:1px dashed rgba(255,255,255,.13);border-radius:6px;background:#070f1c;height:${CH}px;display:flex;align-items:center;justify-content:center"><span style="font-size:.8rem;font-weight:600;color:rgba(255,255,255,.28)">ממתין</span></div>`;
    const r=getRes(id);
    const live=isLive(id);
    const hW=r?(r.pen?r.pen==='h':r.h>r.a):false;
    const aW=r?(r.pen?r.pen==='a':r.a>r.h):false;
    const anyW=hW||aW;
    const bdr=live?'rgba(255,80,80,.5)':anyW?'rgba(0,220,80,.45)':r?'rgba(255,200,0,.25)':'rgba(255,255,255,.18)';
    const glow=live?'box-shadow:0 0 8px rgba(255,80,80,.3)':anyW?'box-shadow:0 0 9px rgba(0,220,80,.3)':r?'box-shadow:0 0 7px rgba(255,200,0,.12)':'';
    const row=(flag,name,score,win,lose)=>
      `<div style="flex:1;display:flex;align-items:center;gap:4px;padding:0 6px;background:${win?'rgba(0,185,70,.30)':''};opacity:${lose?0.35:1}">
        <span style="font-size:1.3rem;line-height:1">${flag}</span>
        <span style="font-size:.7rem;color:${win?'#fff':'#c5d9ef'};white-space:nowrap;overflow:hidden;max-width:58px;font-weight:${win?700:500}">${sh(name)}</span>
        ${r!=null?`<span style="margin-right:auto;font-size:.75rem;font-weight:800;color:${win?'#7fff7f':live?'#ff8080':'#c5d9ef'}">${score}${r.pen&&win?' פנ':''}</span>`:''}
      </div>`;
    return `<div style="border:1px solid ${bdr};border-radius:6px;overflow:hidden;background:#070f1c;height:${CH}px;display:flex;flex-direction:column;${glow}">
      ${live?`<div style="height:2px;background:rgba(255,80,80,.7)"></div>`:''}
      ${row(fl(h),tn(h),r?.h??'',hW,aW)}
      <div style="height:1px;background:rgba(255,255,255,.08)"></div>
      ${row(fl(a),tn(a),r?.a??'',aW,hW)}
    </div>`;
  }

  function col(ids, n){
    const slotH=H/n;
    const divs=ids.map((id,i)=>{
      const top=Math.round(slotH*i+(slotH-CH)/2);
      return `<div style="position:absolute;top:${top}px;left:0;right:0;padding:0 2px">${card(id)}</div>`;
    }).join('');
    return `<div style="position:relative;width:${CW}px;height:${H}px;flex-shrink:0">${divs}</div>`;
  }

  function conn(n, side){
    const c='rgba(160,200,240,.3)', W2=SW/2, slotH=H/n;
    let p='';
    for(let i=0;i<n;i+=2){
      const y1=slotH*(i+.5), y2=slotH*(i+1.5), ym=(y1+y2)/2;
      p+=side==='r'
        ?`<line x1="0" y1="${y1}" x2="${W2}" y2="${y1}"/><line x1="${W2}" y1="${y1}" x2="${W2}" y2="${y2}"/><line x1="0" y1="${y2}" x2="${W2}" y2="${y2}"/><line x1="${W2}" y1="${ym}" x2="${SW}" y2="${ym}"/>`
        :`<line x1="${SW}" y1="${y1}" x2="${W2}" y2="${y1}"/><line x1="${W2}" y1="${y1}" x2="${W2}" y2="${y2}"/><line x1="${SW}" y1="${y2}" x2="${W2}" y2="${y2}"/><line x1="${W2}" y1="${ym}" x2="0" y2="${ym}"/>`;
    }
    return `<svg width="${SW}" height="${H}" style="flex-shrink:0"><g stroke="${c}" stroke-width="1.5" fill="none">${p}</g></svg>`;
  }

  function sconn(){
    const cy=H/2, c='rgba(160,200,240,.3)';
    return `<svg width="${SC}" height="${H}" style="flex-shrink:0"><line x1="0" y1="${cy}" x2="${SC}" y2="${cy}" stroke="${c}" stroke-width="1.5"/></svg>`;
  }

  const fy=H/2-CH/2;
  const center=`<div style="position:relative;width:${CW_CTR}px;height:${H}px;flex-shrink:0">
    <div style="position:absolute;top:${fy-62}px;left:0;right:0;text-align:center;font-size:2rem">🏆</div>
    <div style="position:absolute;top:${fy-20}px;left:0;right:0;text-align:center;font-size:.85rem;color:#ffd700;font-weight:900">גמר</div>
    <div style="position:absolute;top:${fy}px;left:4px;right:4px">${card(104)}</div>
    <div style="position:absolute;top:${fy+CH+22}px;left:0;right:0;text-align:center;font-size:.75rem;font-weight:700;color:rgba(255,255,255,.4)">מקום 3</div>
    <div style="position:absolute;top:${fy+CH+38}px;left:4px;right:4px">${card(103)}</div>
  </div>`;

  const lbl=t=>`<div style="width:${CW}px;font-size:1rem;font-weight:900;color:#d4e8fa;text-align:center;flex-shrink:0">${t}</div>`;
  const sp=w=>`<div style="width:${w}px;flex-shrink:0"></div>`;
  const hdr=`<div style="display:flex;align-items:center;margin-bottom:5px">
    ${lbl('32 אחרונות')}${sp(SW)}${lbl('שמינית')}${sp(SW)}${lbl('רבע')}${sp(SW)}${lbl('חצי')}
    ${sp(SC)}<div style="width:${CW_CTR}px;text-align:center;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px">
      <div style="font-size:.8rem;font-weight:900;color:#a8c8e8;white-space:nowrap">🏟️ לוח נוקאאוט</div>
      <div style="font-size:1rem;font-weight:900;color:#ffd700">גמר</div>
    </div>${sp(SC)}
    ${lbl('חצי')}${sp(SW)}${lbl('רבע')}${sp(SW)}${lbl('שמינית')}${sp(SW)}${lbl('32 אחרונות')}
  </div>`;

  return `<div id="bktWrap" style="direction:ltr;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:8px 0 12px;text-align:center">
<div id="bktInner" style="direction:ltr;display:inline-block">
  ${hdr}
  <div style="display:flex;align-items:flex-start">
    ${col([75,78,73,76,84,83,82,81],8)}${conn(8,'r')}
    ${col([89,90,91,92],4)}${conn(4,'r')}
    ${col([97,98],2)}${conn(2,'r')}
    ${col([101],1)}${sconn()}
    ${center}
    ${sconn()}${col([102],1)}
    ${conn(2,'l')}${col([99,100],2)}
    ${conn(4,'l')}${col([93,94,95,96],4)}
    ${conn(8,'l')}${col([74,77,79,80,87,86,85,88],8)}
  </div>
</div>
</div>`;
}

// ── ANIMATED COUNTER ─────────────────────────────────────
function animateCounter(el,target){
  let cur=0; el.classList.add('animate');
  const step=Math.max(1,Math.round(target/30));
  const t=setInterval(()=>{
    cur=Math.min(cur+step,target);
    el.textContent=cur;
    if(cur>=target)clearInterval(t);
  },35);
}

function checkUpcomingNotif(){
  if(!me||Notification.permission!=='granted') return;
  const d=gd(),ps=d.users[me]?.p||{},rs=d.results||{},lv=d.live||{};
  const now=Date.now();
  M.filter(m=>!rs[m.id]&&!lv[m.id]&&!m.r&&!ps[m.id]).forEach(m=>{
    const [hh,mi]=m.t.split(':').map(Number);
    const dt=new Date(m.d+'T'+String(hh-3).padStart(2,'0')+':'+String(mi).padStart(2,'0')+':00Z');
    const diff=dt.getTime()-now;
    if(diff>0&&diff<=30*60*1000&&!_notifSent[m.id]){
      _notifSent[m.id]=true;
      sendNotif(`⚽ נסגר בעוד ${Math.ceil(diff/60000)} דקות!`,`${tn(m.h)} נגד ${tn(m.a)} — מהר להמר!`);
    }
  });
}

function buildScoreChart(){
  const d=gd(),rs=d.results||{};
  const users=Object.keys(d.users||{});
  if(!users.length) return '';
  const played=M.filter(m=>rs[m.id]).sort((a,b)=>a.d.localeCompare(b.d)||a.t.localeCompare(b.t));
  if(played.length<2) return '';
  const scores={};
  users.forEach(u=>{const ps=d.users[u]?.p||{};let cum=0;scores[u]=played.map(m=>{if(ps[m.id])cum+=pts(ps[m.id],rs[m.id]);return cum;});});
  const maxScore=Math.max(...Object.values(scores).flat(),1);
  const W=320,H=175,PL=32,PR=18,PT=16,PB=28;
  const IW=W-PL-PR,IH=H-PT-PB,n=played.length;
  const xS=i=>PL+(n===1?IW/2:i/(n-1)*IW);
  const yS=v=>PT+IH-(v/maxScore)*IH;
  function bezierPath(pts){
    if(pts.length<2)return'';
    let d=`M${pts[0][0].toFixed(1)},${pts[0][1].toFixed(1)}`;
    for(let i=1;i<pts.length;i++){
      const p0=pts[i-1],p1=pts[i],cpx=(p0[0]+p1[0])/2;
      d+=` C${cpx.toFixed(1)},${p0[1].toFixed(1)} ${cpx.toFixed(1)},${p1[1].toFixed(1)} ${p1[0].toFixed(1)},${p1[1].toFixed(1)}`;
    }
    return d;
  }
  const COLORS=['#64b5f6','#00dc50','#ff6b6b','#ba68c8','#4db6ac','#ffb74d'];
  const sortedU=[...users.filter(u=>u!==me),me].filter(u=>scores[u]);
  const defs=`<defs>
    <linearGradient id="fillG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0.01"/>
    </linearGradient>
    <filter id="glw" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>`;
  let grid='';
  const gVals=[0,Math.round(maxScore*.33),Math.round(maxScore*.66),maxScore];
  gVals.forEach(v=>{
    const y=yS(v).toFixed(1);
    grid+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="rgba(255,255,255,.07)" stroke-width="1" stroke-dasharray="4,4"/>`;
    grid+=`<text x="${PL-5}" y="${parseFloat(y)+4}" font-size="9" fill="rgba(255,255,255,.28)" text-anchor="end">${v}</text>`;
  });
  grid+=`<line x1="${PL}" y1="${PT}" x2="${PL}" y2="${PT+IH}" stroke="rgba(255,255,255,.1)" stroke-width="1"/>`;
  grid+=`<line x1="${PL}" y1="${PT+IH}" x2="${W-PR}" y2="${PT+IH}" stroke="rgba(255,255,255,.1)" stroke-width="1"/>`;
  let xLbls='';
  const xStep=Math.max(1,Math.floor(n/5));
  for(let i=0;i<n;i+=xStep){
    xLbls+=`<text x="${xS(i).toFixed(1)}" y="${H-6}" font-size="8" fill="rgba(255,255,255,.25)" text-anchor="middle">${played[i].d.slice(5).replace('-','/')}</text>`;
  }
  let fills='',lines='',dots='',lbls='';
  sortedU.forEach((u,idx)=>{
    const sc=scores[u],isMe=u===me;
    const color=isMe?'#FFD700':COLORS[idx%COLORS.length];
    const ptsList=sc.map((v,i)=>[xS(i),yS(v)]);
    const pathD=bezierPath(ptsList);
    if(isMe){
      const bot=PT+IH;
      fills+=`<path d="${pathD} L${xS(n-1).toFixed(1)},${bot} L${PL},${bot} Z" fill="url(#fillG)"/>`;
      lines+=`<path d="${pathD}" stroke="#FFD700" stroke-width="1.8" fill="none" opacity="0.35" filter="url(#glw)"/>`;
      lines+=`<path d="${pathD}" stroke="#FFD700" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`;
    } else {
      lines+=`<path d="${pathD}" stroke="${color}" stroke-width="1.5" fill="none" opacity="0.45" stroke-linecap="round" stroke-linejoin="round"/>`;
    }
    ptsList.forEach(([x,y],i)=>{
      if(i<n-1) dots+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${isMe?2:1.5}" fill="${color}" opacity="${isMe?.7:.35}"/>`;
    });
    const lx=xS(n-1),ly=yS(sc[n-1]);
    if(isMe){
      dots+=`<circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="7" fill="#FFD700" opacity="0.15" filter="url(#glw)"/>`;
      dots+=`<circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="4.5" fill="#FFD700"/>`;
      dots+=`<circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="2" fill="#fff"/>`;
    } else {
      dots+=`<circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="3" fill="${color}" opacity="0.6"/>`;
    }
    const anchor=lx>W-75?'end':'start',dx=lx>W-75?-10:10;
    lbls+=`<text x="${(lx+dx).toFixed(1)}" y="${(ly+4).toFixed(1)}" font-size="${isMe?10:8.5}" fill="${color}" opacity="${isMe?1:.65}" text-anchor="${anchor}" font-weight="${isMe?'700':'400'}">${u}</text>`;
  });
  return `<div style="background:linear-gradient(135deg,rgba(255,255,255,.05),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px 10px 10px;margin-bottom:14px">
    <div style="font-size:.72rem;color:rgba(200,220,255,.6);margin-bottom:10px;text-align:center;letter-spacing:.8px;font-weight:600">📈 התקדמות ניקוד</div>
    <svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible">${defs}${grid}${xLbls}${fills}${lines}${dots}${lbls}</svg>
  </div>`;
}

// ── STREAK CALCULATION ────────────────────────────────────
function calcStreak(u){
  const d=gd(),ps=d.users[u]?.p||{},rs=d.results||{};
  // משחקים עם תוצאות, ממוינים לפי תאריך
  const played=M.filter(m=>ps[m.id]&&rs[m.id]).sort((a,b)=>a.d.localeCompare(b.d)||(a.t.localeCompare(b.t)));
  let cur=0,best=0;
  played.forEach(m=>{
    const pt=pts(ps[m.id],rs[m.id]);
    if(pt>0){cur++;best=Math.max(best,cur);}else cur=0;
  });
  return{cur,best};
}

// ── STREAK BONUS ──────────────────────────────────────────
function streakBonus(u){
  const d=gd(),ps=d.users[u]?.p||{},rs=d.results||{};
  const played=M.filter(m=>ps[m.id]&&rs[m.id]).sort((a,b)=>a.d.localeCompare(b.d)||(a.t.localeCompare(b.t)));
  let bonus=0,cur=0;
  played.forEach(m=>{
    if(pts(ps[m.id],rs[m.id])>0){cur++;if(cur>=3)bonus++;}
    else cur=0;
  });
  return bonus;
}

// ── GROUP STANDINGS (ESPN) ────────────────────────────────
async function fetchStandings(){
  const container=document.getElementById('standingsContainer');
  if(!container) return;
  // חשב מהנתונים שלנו לפי תוצאות שנרשמו
  const d=gd(), rs=d.results||{};
  const byGroup={};
  M.forEach(m=>{
    if(!byGroup[m.g])byGroup[m.g]={};
    [m.h,m.a].forEach(t=>{
      const nm=tn(t),fl2=fl(t);
      if(!byGroup[m.g][nm])byGroup[m.g][nm]={name:nm,flag:fl2,p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};
    });
    const r=rs[m.id]; if(!r) return;
    const hT=tn(m.h),aT=tn(m.a);
    byGroup[m.g][hT].p++; byGroup[m.g][aT].p++;
    byGroup[m.g][hT].gf+=r.h; byGroup[m.g][hT].ga+=r.a;
    byGroup[m.g][aT].gf+=r.a; byGroup[m.g][aT].ga+=r.h;
    if(r.h>r.a){byGroup[m.g][hT].w++;byGroup[m.g][hT].pts+=3;byGroup[m.g][aT].l++;}
    else if(r.h<r.a){byGroup[m.g][aT].w++;byGroup[m.g][aT].pts+=3;byGroup[m.g][hT].l++;}
    else{byGroup[m.g][hT].d++;byGroup[m.g][hT].pts++;byGroup[m.g][aT].d++;byGroup[m.g][aT].pts++;}
  });
  let html='';
  Object.keys(byGroup).filter(g=>g.length===1).sort().forEach(g=>{
    const teams=Object.values(byGroup[g]).sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf);
    html+=`<div class="st-group"><div class="st-head">🏟️ בית ${g}</div>
      <div class="st-row header"><div></div><div>קבוצה</div><div>מ'</div><div>נ</div><div>ת</div><div>ה</div><div>נק'</div></div>`;
    teams.forEach((t,i)=>{
      html+=`<div class="st-row${i<2?' qualify':''}">
        <div class="st-pos">${i+1}</div>
        <div class="st-name">${t.flag} ${t.name}</div>
        <div class="st-num">${t.p}</div>
        <div class="st-num">${t.w}</div>
        <div class="st-num">${t.d}</div>
        <div class="st-num">${t.l}</div>
        <div class="st-pts">${t.pts}</div>
      </div>`;
    });
    html+='</div>';
  });
  container.innerHTML=html||'<div class="empty">אין תוצאות עדיין לחישוב טבלה</div>';
}

function renderKnockout(){
  const d=gd(), myKo=d.knockout?.[me]||{}, koRes=d.koResults||{};
  let html=`<div class="sec" style="padding:0 4px">🏟️ נוקאאוט — בחר מי תנצח בכל שלב</div>`;
  // points summary
  let koPts=0;
  KO_ROUNDS.forEach(rnd=>{
    const picks=myKo[rnd.key]||[];
    const res=koRes[rnd.key]||[];
    picks.forEach(t=>{if(res.includes(t))koPts+=rnd.pts;});
  });
  if(koPts>0) html+=`<div style="text-align:center;margin-bottom:10px"><span class="streak-badge">🏆 ${koPts} נקודות מנוקאאוט</span></div>`;

  KO_ROUNDS.forEach(rnd=>{
    const picks=myKo[rnd.key]||[];
    const res=koRes[rnd.key]||[];
    html+=`<div class="ko-section"><div class="ko-head"><span>${rnd.label}</span><span class="ko-pts-badge">+${rnd.pts} לכל ניחוש</span></div>
      <div class="ko-slots">`;
    for(let i=0;i<rnd.slots;i++){
      const t=picks[i]||'';
      const f=t?TEAM_FLAGS[t]||'🏳️':'';
      let cls='ko-slot'+(t?' filled':'');
      if(t&&res.length){cls+=res.includes(t)?' correct':' wrong';}
      const lbl=t?`<span class="ko-slot-flag">${f}</span><span class="ko-slot-name">${t}</span>`:`<span>+ בחר קבוצה</span>`;
      html+=`<div class="${cls}" onclick="openKoPick('${rnd.key}',${i})">${lbl}</div>`;
    }
    html+=`</div></div>`;
  });
  html+=`<button class="ko-save-btn" onclick="saveKnockout()">💾 שמור ניחושי נוקאאוט</button>`;
  document.getElementById('knockoutView').innerHTML=html;
}

function sbMerge(remote,local){
  if(!remote) return local;
  const m={...remote};
  m.users={...(remote.users||{}),...(local.users||{})};
  m.chatRoom=local.chatRoom||remote.chatRoom;
  if(local.chatMsgs) m.chatMsgs=local.chatMsgs;
  if(local.live) m.live=local.live;
  m.results={...(local.results||{}),...(remote.results||{})};
  if(remote.specialResults) m.specialResults=remote.specialResults;
  if(remote.koResults) m.koResults=remote.koResults;
  m.specials={...(local.specials||{}),...(remote.specials||{})};
  m.knockout={...(local.knockout||{}),...(remote.knockout||{})};
  return m;
}

      const msg=JSON.parse(buf.toString());
      if(!chatMsgs.find(m=>m.id===msg.id)){
        chatMsgs.push(msg); chatMsgs.sort((a,b)=>a.ts-b.ts);
        saveChatMsgs();
        if(document.getElementById('sChat').classList.contains('active')){
          renderChatMessages(); scrollChat();
        } else {
          unreadCount++; showMsgBadge();
        }
      }
    }catch(e){}
  });
  mqttClient.on('error',()=>setChatStatus('off'));
  mqttClient.on('offline',()=>{chatConnected=false; setChatStatus('off');});
  mqttClient.on('reconnect',()=>setChatStatus('wait'));
}

function setChatStatus(s){
  chatConnected=(s==='on');
  const el=document.getElementById('chatSt');
  if(!el)return;
  el.textContent=s==='on'?'🟢 מחובר':s==='wait'?'🟡 מתחבר...':'🔴 לא מחובר';
}

function showMsgBadge(){
  const b=document.getElementById('msgBadge');
  if(!b||unreadCount===0)return;
  b.style.display='block'; b.textContent=unreadCount>9?'9+':unreadCount;
}
function clearMsgBadge(){
  unreadCount=0;
  const b=document.getElementById('msgBadge');
  if(b){b.style.display='none'; b.textContent='0';}
  chatOpen=true;
}

function renderChatMessages(){
  const el=document.getElementById('chatMsgs');
  if(!el)return;
  if(!chatMsgs.length){
    el.innerHTML=`<div class="empty" style="padding:50px 20px">
      <div style="font-size:3rem">💬</div>
      <p>שלח את ההודעה הראשונה!<br><small style="color:var(--muted)">שתף את קוד הקבוצה עם החברים</small></p></div>`;
    return;
  }
  let html='', lastDate='';
  chatMsgs.forEach(msg=>{
    const d=new Date(msg.ts);
    const dateStr=d.toLocaleDateString('he-IL',{day:'numeric',month:'long',year:'numeric'});
    if(dateStr!==lastDate){
      html+=`<div class="date-sep"><span>${dateStr}</span></div>`;
      lastDate=dateStr;
    }
    const isMe=msg.sender===me;
    const time=d.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
    const txt=msg.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    html+=`<div class="msg-wrap ${isMe?'me':'other'}">
      ${!isMe?`<div class="msg-name">${msg.sender}</div>`:''}
      <div class="msg-bubble">${txt}<span class="msg-time">${time}${isMe?' ✓✓':''}</span></div>
    </div>`;
  });
  el.innerHTML=html;
}

function autoResize(el){

// ── PREDICTION SYNC VIA MQTT ─────────────────────────────
function publishMyPreds(){
  if(!mqttClient||!chatConnected||!chatRoom||!me) return;
  const d=gd();
  try{
    mqttClient.publish(
      `mondial2026/v1/${chatRoom}/sync/${me}`,
      JSON.stringify({user:me,preds:d.users[me]?.p||{},ts:Date.now()}),
      {qos:0,retain:true}
    );
  }catch(e){}
}

function publishResults(){
  if(!mqttClient||!chatConnected||!chatRoom) return;
  const d=gd();
  try{
    mqttClient.publish(
      `mondial2026/v1/${chatRoom}/results`,
      JSON.stringify({results:d.results||{},scorers:d.scorers||{},assists:d.assists||{},ts:Date.now()}),
      {qos:0,retain:true}
    );
  }catch(e){}
}

function handleResultSync(buf){
  try{
    const data=JSON.parse(buf.toString());
    const d=gd();
    let changed=false;
    Object.entries(data.results||{}).forEach(([id,r])=>{
      const k=Number(id);
      if(JSON.stringify(d.results[k])!==JSON.stringify(r)){d.results[k]=r;if(d.live)delete d.live[k];changed=true;}
    });
    Object.entries(data.scorers||{}).forEach(([id,sc])=>{
      if(JSON.stringify(d.scorers[id])!==JSON.stringify(sc)){d.scorers[id]=sc;changed=true;}
    });
    Object.entries(data.assists||{}).forEach(([id,as])=>{
      if(JSON.stringify(d.assists[id])!==JSON.stringify(as)){d.assists[id]=as;changed=true;}
    });
    if(changed){
      sd(d);
      renderMatches(); renderBoard(); renderStats(); renderKnockout();
      if(document.querySelector('.screen.active')?.id==='sKings') renderKings();
    }
  }catch(e){}
}

function handlePredSync(topic,buf){
  try{
    const data=JSON.parse(buf.toString());
    if(!data.user||data.user===me) return;
    const d=gd();
    const isNew=!d.users[data.user];
    if(!d.users[data.user]) d.users[data.user]={p:{}};
    d.users[data.user].p={...d.users[data.user].p,...(data.preds||{})};
    if(!d.groupUsers) d.groupUsers=[];
    if(!d.groupUsers.includes(data.user)) d.groupUsers.push(data.user);
    sd(d);
    if(isNew) showBanner(`${data.user} הצטרף לקבוצה! 🎉`,'👥',3000);
    const scr=document.querySelector('.screen.active');
    if(scr?.id==='sBoard') renderBoard();
    if(scr?.id==='sStats') renderStats();
    if(scr?.id==='sGroup') renderGroup();
  }catch(e){}
}
